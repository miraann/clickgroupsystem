<style>
  html,body{background:#03205c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;margin:0;min-height:100vh;}
  body[dir="rtl"]{font-family:'KurdishFont',-apple-system,BlinkMacSystemFont,sans-serif;}
  .ico{stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
  .ico-fill{fill:currentColor;stroke:none;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

  /* Signature icon badge — radial glow + dark inner disk + vibrant glyph */
  .badge {
    position:relative;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .badge::before{
    content:'';
    position:absolute;
    inset:-30%;
    border-radius:9999px;
    background:radial-gradient(closest-side, var(--glow,rgba(251,191,36,0.55)), transparent 70%);
    filter:blur(6px);
    z-index:0;
  }
  .badge-disk{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    border-radius:9999px;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.06), rgba(255,255,255,0) 60%),
                linear-gradient(160deg, #14305e 0%, #061a40 100%);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 6px 14px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }
  .badge .glyph{
    position:relative;
    z-index:2;
    display:flex;align-items:center;justify-content:center;
    line-height:0;
  }
  .badge .glyph svg{ display:block; width:100%; height:100%; }
  .badge.is-active::before{
    background: radial-gradient(closest-side, rgba(139,92,246,0.85), rgba(99,102,241,0.4) 50%, transparent 75%);
    filter:blur(8px);
  }
  .badge.is-active .badge-disk{
    background: radial-gradient(circle at 30% 25%, rgba(167,139,250,0.35), rgba(99,102,241,0.10) 60%),
                linear-gradient(160deg, #6d28d9 0%, #3730a3 100%);
    border-color: rgba(167,139,250,0.5);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 8px 24px rgba(124,58,237,0.5);
  }
  .tile{
    position:relative;
    overflow:hidden;
    transition: transform 220ms ease, background 220ms ease, border-color 220ms ease;
  }
  .tile::after{
    content:'';
    position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(140% 90% at 50% -10%, rgba(255,255,255,0.05), transparent 60%);
  }
  .tile:hover{
    background: rgba(255,255,255,0.06);
    border-color: rgba(255,255,255,0.18);
    transform: translateY(-2px);
  }
  .tile.active{
    background: linear-gradient(160deg, rgba(139,92,246,0.18), rgba(99,102,241,0.10) 60%, rgba(255,255,255,0.04));
    border-color: rgba(167,139,250,0.45);
    box-shadow: 0 0 0 1px rgba(167,139,250,0.10), 0 18px 40px rgba(124,58,237,0.30);
  }
  .tile.active .tile-label{ color:#c4b5fd; }
  .tile:active{ transform: translateY(0) scale(0.99); }

  .section-eyebrow{
    font-size:11px;
    letter-spacing:0.18em;
    color: rgba(255,255,255,0.45);
    font-weight:600;
  }

  @keyframes pulseSlow{0%,100%{opacity:0.5}50%{opacity:0.85}}
  .orb{position:absolute;border-radius:9999px;filter:blur(80px);pointer-events:none;animation:pulseSlow 7s ease-in-out infinite;}

  .panel-enter{ animation: panelIn 280ms cubic-bezier(.2,.7,.2,1) both; }
  @keyframes panelIn{ from{ opacity:0; transform: translateY(8px);} to{ opacity:1; transform:none;} }

  .toggle-track{
    width:36px; height:20px; border-radius:9999px;
    background: rgba(255,255,255,0.10);
    position:relative; transition: background .2s;
  }
  .toggle-knob{
    position:absolute; top:2px; left:2px;
    width:16px; height:16px; border-radius:9999px;
    background:#fff; transition: left .2s, background .2s;
  }
  .toggle-on .toggle-track{ background: linear-gradient(135deg,#fbbf24,#f97316); }
  .toggle-on .toggle-knob{ left:18px; }

  /* RTL fixes */
  [dir="rtl"] .rtl-flip{ transform: scaleX(-1); }

  .input{
    width:100%; background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:12px; padding:10px 14px; color:#fff;
    font-size:14px; outline:none; transition:border-color .15s, background .15s;
  }
  .input:focus{ border-color: rgba(251,191,36,0.45); background:rgba(255,255,255,0.06); }
  .input::placeholder{ color: rgba(255,255,255,0.30);}

  .btn-primary{
    background: linear-gradient(135deg,#fbbf24 0%, #f97316 100%);
    color:#1a0c00; font-weight:700;
    border-radius:12px; padding:10px 18px;
    box-shadow: 0 10px 24px rgba(245,158,11,0.30);
    transition: transform .15s, box-shadow .2s;
  }
  .btn-primary:hover{ box-shadow: 0 14px 30px rgba(245,158,11,0.40); }
  .btn-primary:active{ transform: scale(.98); }

  .btn-ghost{
    background: rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.10);
    color: rgba(255,255,255,0.85); font-weight:600;
    border-radius:12px; padding:10px 16px;
    transition: background .15s, border-color .15s;
  }
  .btn-ghost:hover{ background: rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.20);}

  .row{
    display:flex; align-items:center; gap:14px;
    padding:14px 16px;
    border-radius:14px;
    transition: background .15s;
  }
  .row + .row{ border-top:1px solid rgba(255,255,255,0.05); }
  .row:hover{ background: rgba(255,255,255,0.03);}

/* ---------- TILE ---------- */
function Tile({ item, label, sub, onClick, active }) {
  return (
    <button
      onClick={onClick}
      className={`tile group text-left rounded-2xl p-4 border ${active?'active':'border-white/10 bg-white/[0.035]'} backdrop-blur-xl flex flex-col items-center justify-center gap-3 min-h-[130px]`}
      style={{ width: item.span===2 ? 372 : 180, maxWidth: '100%' }}
    >
      <Badge icon={item.icon} color={item.color} size={item.span===2 ? 56 : 48} active={active} />
      <div className="text-center px-1">
        <div className="tile-label text-[13px] font-semibold text-white leading-tight">{label}</div>
        <div className="text-[11px] text-white/40 mt-0.5 leading-tight line-clamp-2">{sub}</div>
      </div>
    </button>
  );
}

/* ---------- HOME GRID ---------- */
function Home({ lang, query, onOpen, activeId }) {
  const t = copy[lang];
  const q = query.trim().toLowerCase();
  return (
    <div className="px-5 md:px-10 py-8 max-w-[1400px] mx-auto relative">
      <div className="flex items-end justify-center mb-8 flex-wrap gap-4 text-center">
        <div>
          <h1 className="text-3xl md:text-4xl font-bold tracking-tight">{t.title}</h1>
          <p className="text-sm text-white/45 mt-1.5 max-w-lg mx-auto">{t.subtitle}</p>
        </div>
      </div>

      <div className="space-y-10">
        {SECTIONS.map(sec => {
          const items = sec.items.filter(it => {
            if (!q) return true;
            const [n,s] = t.items[it.id] || [];
            return (n||"").toLowerCase().includes(q) || (s||"").toLowerCase().includes(q);
          });
          if (!items.length) return null;
          return (
            <section key={sec.key} className="mx-auto" style={{ maxWidth: '1200px' }}>
              <div className="section-eyebrow uppercase mb-4 text-center">{t.sections[sec.key]}</div>
              <div className="flex flex-wrap gap-3 justify-center">
                {items.map(it => {
                  const [n,s] = t.items[it.id] || [it.id, ""];
                  return <Tile key={it.id} item={it} label={n} sub={s} active={activeId===it.id} onClick={()=>onOpen(it.id)} />;
                })}
              </div>
            </section>
          );
        })}
      </div>

      <div className="mt-16 mb-4 text-center text-[11px] tracking-wider text-white/25">
        ClickGroup POS · Multi-tenant Restaurant Management Platform
      </div>
    </div>
  );
}
